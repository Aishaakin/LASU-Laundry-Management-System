app = "lasu-laundry-management-system"

[build]
  builder = "paketobuildpacks/builder:base"

[[build.env]]
  BP_PIP_REQUIREMENTS_FILE = "backend/requirements.txt"
  BP_PYTHON_PROJECT_ROOT = "backend"

[env]
  DJANGO_SETTINGS_MODULE = "core.settings"
  PYTHONPATH = "/app/backend"

[[services]]
  http_checks = []
  internal_port = 8000
  processes = ["app"]
  protocol = "tcp"
  script_checks = []

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20
    type = "connections"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.tcp_checks]]
    grace_period = "1s"
    interval = "15s"
    restart_limit = 0
    timeout = "2s"